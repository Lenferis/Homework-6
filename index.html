<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martin Štrba</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@200;300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<main class="main">
    <article class="profile-card">
        
        <header class="profile-card__header">
            <div class="profile-card__actions">
                <button class="profile-card__icon-btn" aria-label="Оповіщення">
                    <svg class="profile-card__icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>bell</title><path d="M21,19V20H3V19L5,17V11C5,7.9 7.03,5.17 10,4.29C10,4.19 10,4.1 10,4A2,2 0 0,1 12,2A2,2 0 0,1 14,4C14,4.1 14,4.19 14,4.29C16.97,5.17 19,7.9 19,11V17L21,19M14,21A2,2 0 0,1 12,23A2,2 0 0,1 10,21" /></svg>
                </button>
                <button class="profile-card__icon-btn" aria-label="Повідомлення">
                    <svg class="profile-card__icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>mail</title><path d="M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4M17,17H7V15H17M17,13H7V11H17M20,9H17V6H20" /></svg>
                </button>
            </div>

            <div class="profile-card__avatar-wrapper">
                <img class="profile-card__avatar" src="assets/img/avatar.jpg" alt="Martin Štrba">
            </div>

            <h1 class="profile-card__name">Martin Štrba</h1>
            <p class="profile-card__nickname">@m_strba</p>
        </header>

        <button class="profile-card__action-btn" aria-label="Редактировать профиль или написать">
            <svg class="profile-card__action-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>pencil-box</title><path d="M19,3A2,2 0 0,1 21,5V19C21,20.11 20.1,21 19,21H5A2,2 0 0,1 3,19V5A2,2 0 0,1 5,3H19M16.7,9.35C16.92,9.14 16.92,8.79 16.7,8.58L15.42,7.3C15.21,7.08 14.86,7.08 14.65,7.3L13.65,8.3L15.7,10.35L16.7,9.35M7,14.94V17H9.06L15.12,10.94L13.06,8.88L7,14.94Z" /></svg>
        </button>

        <footer class="profile-card__stats">
            
            <div class="profile-card__stat-item">
                <span class="profile-card__stat-value">379</span>
                <span class="profile-card__stat-label">TWEETS</span>
            </div>
            
            <div class="profile-card__stat-item">
                <span class="profile-card__stat-value">766</span>
                <span class="profile-card__stat-label">FOLLOWING</span>
            </div>
            
            <div class="profile-card__stat-item">
                <span class="profile-card__stat-value">166</span>
                <span class="profile-card__stat-label">FOLLOWERS</span>
            </div>

        </footer>

    </article>
    
</main>
</body>
</html>
